# ============================================================
#  Embedding Worker — docker-compose
#
#  Usage:
#    CPU only:
#      docker compose up
#
#    NVIDIA GPU:
#      docker compose -f docker-compose.yml -f docker-compose.nvidia.yml up
#
#    AMD GPU:
#      docker compose -f docker-compose.yml -f docker-compose.amd.yml up
#
#  Build first:
#      docker compose build
# ======================================
services:
  embedding-worker:
    build: .
    image: embedding-worker:latest
    container_name: ${NODE_NAME:-embedding-worker}
    restart: on-failure
    volumes:
      - /home/model:/root/.cache/huggingface
    env_file:
      - .env
    environment:
      - NODE_NAME=${NODE_NAME:-worker-cpu-1}
      - HF_MODEL_NAME=${HF_MODEL_NAME:-Qwen/Qwen3-Embedding-8B}
      - HF_HOME=/root/.cache/huggingface
      - PRECISION=${PRECISION:-float16}
      - N8N_GET_URL=${N8N_GET_URL}
      - N8N_SAVE_URL=${N8N_SAVE_URL}
      - N8N_API_KEY=${N8N_API_KEY}
      - N8N_STATUS_URL=${N8N_STATUS_URL:-}
      - STATUS_INTERVAL=${STATUS_INTERVAL:-10}
      - BATCH_SIZE=${BATCH_SIZE:-10}
      - DELAY_SECONDS=${DELAY_SECONDS:-5}
      - STOP_AT=${STOP_AT:-}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-30}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
